name: release

# 三平台 release pipeline (Phase 2):
#   macos-14 (arm64 原生) + ubuntu-22.04 (AppImage glibc 兼容) + windows-latest
# 触发: push tag v*  或  workflow_dispatch with version input
# 产物经 cargo tauri build 直出, rename 为项目老命名兼容老下载链接,
# 收口 job 跑 xtask release-bundle 出 sha256 + .sig + latest.json,
# 最终落到一个 draft GitHub release 让用户手动 ready/publish。
#
# Secrets (按需):
#   RELEASE_PRIVATE_KEY_PEM     必须 - xtask release-bundle RSA-3072 自签私钥
#   APPLE_CERTIFICATE           可选 - Apple Developer ID .p12 (base64)
#   APPLE_CERTIFICATE_PASSWORD  可选
#   APPLE_SIGNING_IDENTITY      可选 - 形如 "Developer ID Application: Foo (TEAMID)"
#   APPLE_API_KEY_BASE64        可选 - .p8 文件 base64, 公证用
#   APPLE_API_KEY               可选 - Key ID
#   APPLE_API_ISSUER            可选 - Issuer ID
# 详见 docs/cleanup-plan.md §2.4

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: '不带 v 前缀 (如 2.0.1, 2.0.1-rc1)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: 'app,dmg'
            plat: macOS-arm64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: 'deb,appimage'
            plat: Linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: 'nsis,msi'
            plat: Windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux deps (with retry)
        if: matrix.os == 'ubuntu-22.04'
        timeout-minutes: 8
        run: |
          set -e
          for i in 1 2 3; do
            echo "::group::apt attempt $i"
            if sudo apt-get update && sudo apt-get install -y --no-install-recommends \
                libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev \
                librsvg2-dev patchelf build-essential file; then
              echo "::endgroup::"; exit 0
            fi
            echo "::endgroup::"
            echo "::warning::apt attempt $i failed, sleeping 30s"
            sleep 30
          done
          echo "::error::apt failed after 3 attempts"; exit 1

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          key: ${{ matrix.target }}

      # cargo binstall 在 windows-latest 上偶发卡死(PR #3 dispatch test 30+ min
      # 无进展); cargo install 稳但 windows-latest 冷编译 tauri-cli 需 15-25 min
      # (PR #6 dispatch test 实测 10 min 不够). 给独立 cache + timeout 25 min.
      - name: Cache cargo-tauri binary
        id: cache-tauri-cli
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-tauri
            ~/.cargo/bin/cargo-tauri.exe
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-tauri-cli-v2

      - name: Install tauri-cli
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        timeout-minutes: 25
        run: cargo install tauri-cli --version "^2" --locked

      - name: Resolve VERSION
        id: ver
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Resolved VERSION=$V"

      - name: Import macOS signing cert
        if: matrix.os == 'macos-14' && env.CERT != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}

      - name: Write Apple notary API key
        if: matrix.os == 'macos-14' && env.KEY_B64 != ''
        shell: bash
        env:
          KEY_B64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          KEY_ID: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$KEY_B64" | base64 -d \
            > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          echo "APPLE_API_KEY_PATH=$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8" >> $GITHUB_ENV

      # macOS Apple env: GH Actions secret 未配置时, 直接传到 env 会变成空字符串,
      # 导致 codesign 用空 identity 失败 ("The specified item could not be found
      # in the keychain", PR #6 dispatch test 实测). 这里把 secret 接到带 _RAW
      # 后缀的 env 上, run 内显式判空再 export, 空时不暴露给 cargo tauri build.
      #
      # macOS 无 Developer ID 路径(secret 未配): 显式 export
      # APPLE_SIGNING_IDENTITY="-" 让 Tauri 在同一次 build 内用 ad-hoc identity
      # 签 .app 和 dmg. 完全未签的 .app 在 macOS Sequoia 15+ 会被 Gatekeeper
      # 无条件拒绝(没有"仍要打开"UI), ad-hoc 签的会显示打开选项.
      #
      # 注意: 不能用"先 build app + 手动 codesign + 再 build dmg"的方案,
      # 因为第二次 cargo tauri build --bundles dmg 时 Tauri 会重新 bundle .app,
      # 把手动 codesign 结果覆盖 (PR #13 review 实测验证). 必须 Tauri 自己在
      # 同一次 build 里完成签名链.
      - name: cargo tauri build
        working-directory: src-tauri
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY_RAW: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER_RAW: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_RAW: ${{ secrets.APPLE_API_KEY }}
        run: |
          [[ -n "$APPLE_SIGNING_IDENTITY_RAW" ]] && export APPLE_SIGNING_IDENTITY="$APPLE_SIGNING_IDENTITY_RAW"
          [[ -n "$APPLE_API_ISSUER_RAW" ]] && export APPLE_API_ISSUER="$APPLE_API_ISSUER_RAW"
          [[ -n "$APPLE_API_KEY_RAW" ]] && export APPLE_API_KEY="$APPLE_API_KEY_RAW"

          # macOS 无 Developer ID 时走 ad-hoc, 让 Tauri 内部 codesign --sign -.
          if [[ "${{ matrix.os }}" == "macos-14" ]] && [[ -z "${APPLE_SIGNING_IDENTITY:-}" ]]; then
            export APPLE_SIGNING_IDENTITY="-"
            echo "::notice::macOS no Developer ID secret, using ad-hoc identity (-)"
          fi

          cargo tauri build --target "${{ matrix.target }}" --bundles "${{ matrix.bundles }}"

      # 三平台 build 后置验证 (PR #13 review 建议): 上传前早 fail, 防 release
      # 上传坏包. 历史教训: v2.0.1 第一次 dispatch 出过 macOS dmg 内 .app
      # 完全未签 → Sequoia Gatekeeper 无路径绕过. 三平台都加各自 sanity
      # check 后这类问题不会再静默上传.
      - name: Verify macOS .app codesign + dmg integrity
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          APP="target/${{ matrix.target }}/release/bundle/macos/Codex App Transfer.app"
          DMG_DIR="target/${{ matrix.target }}/release/bundle/dmg"
          echo "::group::codesign --verify .app (深度严格模式)"
          codesign --verify --deep --strict --verbose=4 "$APP"
          echo "::endgroup::"
          echo "::group::hdiutil verify dmg"
          for d in "$DMG_DIR"/*.dmg; do
            [[ -f "$d" ]] && hdiutil verify "$d"
          done
          echo "::endgroup::"

      - name: Verify Linux .deb / .AppImage integrity
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          DEB_DIR="target/${{ matrix.target }}/release/bundle/deb"
          APPIMG_DIR="target/${{ matrix.target }}/release/bundle/appimage"
          echo "::group::dpkg-deb -I .deb (control + 依赖列表)"
          for f in "$DEB_DIR"/*.deb; do
            [[ -f "$f" ]] && dpkg-deb -I "$f"
          done
          echo "::endgroup::"
          echo "::group::dpkg-deb -c .deb (验证有 usr/bin/codex-app-transfer)"
          for f in "$DEB_DIR"/*.deb; do
            [[ -f "$f" ]] || continue
            dpkg-deb -c "$f" | grep -E "usr/bin/codex-app-transfer\$" || \
              { echo "::error::deb 缺主 binary: $f"; exit 1; }
          done
          echo "::endgroup::"
          echo "::group::AppImage --appimage-extract 验证内部结构"
          for f in "$APPIMG_DIR"/*.AppImage; do
            [[ -f "$f" ]] || continue
            chmod +x "$f"
            (cd /tmp && rm -rf squashfs-root && "$OLDPWD/$f" --appimage-extract > /dev/null) || \
              { echo "::error::AppImage extract failed: $f"; exit 1; }
            ls /tmp/squashfs-root/usr/bin/codex-app-transfer >/dev/null || \
              { echo "::error::AppImage 缺主 binary: $f"; rm -rf /tmp/squashfs-root; exit 1; }
            rm -rf /tmp/squashfs-root
          done
          echo "::endgroup::"

      - name: Verify Windows .exe / .msi integrity
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          NSIS_DIR="target/${{ matrix.target }}/release/bundle/nsis"
          MSI_DIR="target/${{ matrix.target }}/release/bundle/msi"
          echo "::group::file 检查 NSIS Setup.exe 是 PE32+"
          for f in "$NSIS_DIR"/*-setup.exe; do
            [[ -f "$f" ]] || continue
            file "$f" | grep -qE "PE32\+? executable" || \
              { echo "::error::非 PE32 PE32+ Windows 可执行: $f"; exit 1; }
            size=$(wc -c < "$f")
            (( size > 1048576 )) || \
              { echo "::error::Setup.exe 太小 ($size bytes), 疑似坏包: $f"; exit 1; }
            echo "OK: $f ($size bytes)"
          done
          echo "::endgroup::"
          echo "::group::文件存在 + 大小 sanity 检查 .msi"
          for f in "$MSI_DIR"/*.msi; do
            [[ -f "$f" ]] || continue
            size=$(wc -c < "$f")
            (( size > 1048576 )) || \
              { echo "::error::.msi 太小 ($size bytes), 疑似坏包: $f"; exit 1; }
            echo "OK: $f ($size bytes)"
          done
          echo "::endgroup::"

      - name: Rename bundles to project naming
        shell: bash
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          PLAT="${{ matrix.plat }}"
          # Cargo workspace 的 target_directory 是 workspace 根 (Cargo.toml
          # [workspace] 所在目录), 即使 cargo tauri build 在 src-tauri/ 下跑,
          # bundle 也输出到根级 target/, 不是 src-tauri/target/. PR #3 dispatch
          # test 实测 Linux job upload-artifact 报 "No files were found"
          # 即此 BDIR 路径错的征兆.
          BDIR="target/${{ matrix.target }}/release/bundle"
          mkdir -p staging

          # Tauri 2 没有 bundle.fileName 字段, 默认产物名为
          # "Codex App Transfer_<V>_<arch>.<ext>" (productName 带空格透传).
          # glob 用引号 ("$BDIR"/dmg/*.dmg) 命中带空格文件名;
          # cp 时也用引号 cp "$f" "staging/...", 安全.

          shopt -s nullglob
          case "$PLAT" in
            macOS-arm64)
              for f in "$BDIR"/dmg/*.dmg; do
                cp "$f" "staging/Codex-App-Transfer-v${V}-${PLAT}.dmg"
              done
              ;;
            Linux-x86_64)
              for f in "$BDIR"/deb/*.deb; do
                cp "$f" "staging/Codex-App-Transfer-v${V}-${PLAT}.deb"
              done
              for f in "$BDIR"/appimage/*.AppImage; do
                cp "$f" "staging/Codex-App-Transfer-v${V}-${PLAT}.AppImage"
              done
              ;;
            Windows-x64)
              for f in "$BDIR"/nsis/*-setup.exe; do
                cp "$f" "staging/Codex-App-Transfer-v${V}-${PLAT}-Setup.exe"
              done
              for f in "$BDIR"/msi/*.msi; do
                cp "$f" "staging/Codex-App-Transfer-v${V}-${PLAT}.msi"
              done
              ;;
          esac

          echo "Staged artifacts for $PLAT:"
          ls -la staging/

          # 显式空 staging 检查, 早 fail 而非拖到 upload-artifact step 才报错;
          # 失败时 dump bundle 树前 200 行帮助 debug 路径问题.
          files=(staging/*)
          if (( ${#files[@]} == 0 )); then
            echo "::error::No bundles staged for $PLAT from $BDIR"
            echo "--- bundle tree under $BDIR (first 200 entries) ---"
            find "$BDIR" -maxdepth 4 -type f 2>/dev/null | sort | sed -n "1,200p" || \
              echo "($BDIR does not exist)"
            echo "--- target tree (first 200 entries) ---"
            find target -maxdepth 5 -type f 2>/dev/null | sort | sed -n "1,200p" || \
              echo "(target does not exist)"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.plat }}
          path: staging/*
          if-no-files-found: error

  release-bundle:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist-incoming
          merge-multiple: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          key: xtask-release-bundle

      - name: Resolve VERSION
        id: ver
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Write release signing key
        env:
          KEY: ${{ secrets.RELEASE_PRIVATE_KEY_PEM }}
        run: |
          if [[ -z "$KEY" ]]; then
            echo "::error::RELEASE_PRIVATE_KEY_PEM secret 未配置, 无法签 latest.json"
            exit 1
          fi
          mkdir -p .release-signing
          printf '%s\n' "$KEY" > .release-signing/release-private-key.pem
          chmod 600 .release-signing/release-private-key.pem

      - name: xtask release-bundle (Phase 3 起 Rust 替代 release_assets.py)
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ls -la dist-incoming/
          cargo run -p xtask --release -- release-bundle \
            --version "${{ steps.ver.outputs.version }}" \
            --include macos linux windows

      - uses: softprops/action-gh-release@v2
        with:
          files: 'release/*'
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          draft: true
