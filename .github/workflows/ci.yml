name: ci

# 回归门禁: Rust 工作区编译/测试 + xtask gen-fixtures 反向 diff.
# 历史 job 演进:
# - Leptos UI WASM 构建 job 已废弃 (v2.0.0 改用 frontend/ + cas://, Leptos 弃案)
# - python-replay-tests job 已废弃 (Phase 3 删 Python, 删 tests/test_replay_smoke.py)
# 详见 docs/migration-plan.md (Stage 6 架构调整) 与 docs/cleanup-plan.md (Phase 1/3)。

on:
  push:
    branches: [main]
  # branches 不限制, 让 stacked PR (base=feature/* 而非 main) 也跑 CI.
  # GH Actions 免费额度对 public repo 无上限, 不必省 trigger.
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-workspace-check:
    name: Rust · workspace cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # apt-get 偶发性卡 archive.ubuntu.com (曾出现 update 阶段挂 17min 才被 cancel)。
      # 加 timeout + 3 次重试: 每次失败睡 30s,整步 8 分钟硬上限避免再卡死。
      - name: Install Tauri Linux system deps
        timeout-minutes: 8
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "::group::apt attempt $attempt"
            if sudo apt-get update && sudo apt-get install -y --no-install-recommends \
                libwebkit2gtk-4.1-dev \
                libssl-dev \
                libayatana-appindicator3-dev \
                librsvg2-dev \
                patchelf \
                build-essential \
                curl \
                wget \
                file; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::apt attempt $attempt failed, sleeping 30s before retry"
            sleep 30
          done
          echo "::error::apt failed after 3 attempts"
          exit 1

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: cargo fmt --check (workspace)
        run: cargo fmt --all -- --check

      - name: cargo check --workspace
        run: cargo check --workspace --all-targets

      - name: cargo test --workspace
        run: cargo test --workspace --no-fail-fast

      # Phase 3 起的反向 diff 校验: xtask 重新生成 4 份 registry fixture,
      # 与 commit 在仓库的 golden 字节级 diff. 任何 schema/数据变动忘记
      # 同步 fixture 都会让 CI 红, 引导开发者跑
      # `cargo run -p xtask -- gen-fixtures && git add tests/replay/fixtures/registry/`.
      # crates/registry/tests/golden_compat.rs 是单元级 round-trip 保险, 这一步是
      # 端到端"Rust 数据源 → 文件系统"全链路保险, 两层都要.
      - name: Verify fixtures regenerable from Rust (xtask gen-fixtures)
        run: |
          cargo run -p xtask --release -- gen-fixtures
          git diff --exit-code -- tests/replay/fixtures/registry/
