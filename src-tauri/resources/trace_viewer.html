<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Codex App Transfer · 诊断流量查看器</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1f232c; --border: #2a2f3a;
    --fg: #e6e8ec; --muted: #8b93a1; --accent: #4f9cf9; --ok: #3fb950;
    --warn: #d29922; --err: #f85149; --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  header { display: flex; align-items: center; gap: 12px; padding: 8px 14px;
    background: var(--panel); border-bottom: 1px solid var(--border); flex: none; }
  header h1 { font-size: 14px; margin: 0; font-weight: 600; }
  header .grow { flex: 1; }
  #live { display: inline-flex; align-items: center; gap: 5px; color: var(--muted); font-size: 12px; }
  #live .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  #live.on .dot { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  select, input, button { background: var(--panel2); color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 12px; }
  input#q { width: 200px; }
  button { cursor: pointer; }
  button:hover { border-color: var(--accent); }
  main { flex: 1; display: flex; min-height: 0; }
  #list { width: 42%; max-width: 560px; overflow-y: auto; border-right: 1px solid var(--border); }
  .row { padding: 7px 12px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex;
    gap: 8px; align-items: baseline; }
  .row:hover { background: var(--panel); }
  .row.sel { background: var(--panel2); }
  .row .ts { color: var(--muted); font: 11px var(--mono); flex: none; }
  .row .badge { font-size: 10px; padding: 1px 5px; border-radius: 4px; flex: none; text-transform: uppercase; }
  .badge.forward { background: #14304d; color: var(--accent); }
  .badge.mcp { background: #3a2a14; color: var(--warn); }
  .badge.cat_webfetch { background: #14402a; color: var(--ok); }
  .badge.chatgpt_backend { background: #3a2440; color: #c89bf0; }
  .badge.apply_patch { background: #3d2a14; color: #f0a868; }
  .badge.codex_response { background: #142d3d; color: #68c0f0; }
  .row .summary { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font: 12px var(--mono); }
  .row .status { flex: none; font: 11px var(--mono); }
  .st2 { color: var(--ok); } .st4, .st5 { color: var(--err); }
  .stc { color: var(--ok); } .sti { color: var(--err); }  /* apply-patch call: completed / incomplete */
  .sto { color: var(--ok); } .ste { color: var(--err); }  /* apply-patch result: ok / error */
  #detail { flex: 1; overflow-y: auto; padding: 14px; }
  #detail .empty { color: var(--muted); margin-top: 40px; text-align: center; }
  .meta { color: var(--muted); font: 11px var(--mono); margin-bottom: 12px; word-break: break-all; }
  .seg { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .seg > summary { cursor: pointer; padding: 7px 12px; background: var(--panel); font-weight: 600;
    list-style: none; display: flex; justify-content: space-between; }
  .seg > summary::-webkit-details-marker { display: none; }
  .seg .body { padding: 10px 12px; }
  table.hdr { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
  table.hdr td { padding: 2px 6px; vertical-align: top; font: 11px var(--mono); border-bottom: 1px solid var(--border); }
  table.hdr td.k { color: var(--accent); width: 30%; word-break: break-all; }
  table.hdr td.v { color: var(--fg); word-break: break-all; }
  pre.payload { margin: 0; padding: 8px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; overflow-x: auto; font: 11px var(--mono); white-space: pre-wrap; word-break: break-word;
    max-height: 420px; overflow-y: auto; }
  .trunc { color: var(--warn); font-size: 11px; margin-top: 4px; }
  .tools { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .tools button { font-size: 11px; padding: 3px 8px; }
  .tools button.done { border-color: var(--ok); color: var(--ok); }
  pre.diff .del { color: var(--err); }
  pre.diff .add { color: var(--ok); }
  pre.diff .ctx { color: var(--muted); }
  /* [MOC-184] C 用量 chips / D 分组头 / E 结构化卡片 / F 键盘提示 */
  .usage { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .uchip { font: 11px var(--mono); padding: 2px 7px; border-radius: 4px; background: var(--panel2);
    border: 1px solid var(--border); color: var(--muted); }
  .uchip b { color: var(--fg); font-weight: 600; }
  .uchip.cache b { color: var(--ok); } .uchip.reason b { color: var(--warn); }
  /* apply-patch 页:决策 / 校验 verdict 胶囊 */
  .vchip { font: 11px var(--mono); padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); }
  .vchip.ok { background: #14402a; color: var(--ok); border-color: #1f6b40; }
  .vchip.warn { background: #3d2a14; color: var(--warn); border-color: #6b4a1f; }
  .vchip.err { background: #3a1414; color: var(--err); border-color: #6b1f1f; }
  .group-hd { position: sticky; top: 0; padding: 4px 12px; background: var(--panel2); color: var(--accent);
    font: 600 11px var(--mono); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .group-hd .cnt { color: var(--muted); }
  .card { border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; margin-bottom: 8px; background: var(--bg); }
  .card .role { display: inline-block; font: 10px var(--mono); text-transform: uppercase; color: var(--accent);
    background: var(--panel2); padding: 1px 6px; border-radius: 4px; margin-bottom: 6px; }
  .card .role.tool { color: var(--ok); text-transform: none; }
  .card .tdesc { color: var(--muted); font-size: 11px; margin-bottom: 6px; }
  pre.payload.mini { max-height: 240px; font-size: 11px; }
  .hint { color: var(--muted); font-size: 11px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>诊断流量查看器</h1>
    <span id="live"><span class="dot"></span><span id="livetxt">连接中…</span></span>
    <span class="grow"></span>
    <select id="kind">
      <option value="all">全部</option>
      <option value="forward">forward</option>
      <option value="mcp">mcp</option>
      <option value="cat_webfetch">cat-webfetch</option>
      <option value="chatgpt_backend">chatgpt-backend</option>
      <option value="apply_patch">apply-patch</option>
      <option value="codex_response">codex-response</option>
    </select>
    <select id="group">
      <option value="none">不分组</option>
      <option value="provider">按 provider</option>
      <option value="model">按 model</option>
    </select>
    <input id="q" type="search" placeholder="搜 path / provider / url…" />
    <button id="clear">清空</button>
    <span class="hint">j/k 导航</span>
  </header>
  <main>
    <div id="list"></div>
    <div id="detail"><div class="empty">选择左侧一条记录查看详情</div></div>
  </main>
</div>
<script>
(function () {
  const $ = (s) => document.querySelector(s);
  const listEl = $("#list"), detailEl = $("#detail"), liveEl = $("#live"), liveTxt = $("#livetxt");
  let traces = [];          // 全部记录(value 对象)
  let selected = null;      // 当前选中的 seq
  let visibleSeqs = [];     // [MOC-184 · F] 当前过滤/分组后可见行的 seq(视觉顺序),键盘导航用

  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  function kindOf(t) {
    if (!t) return "mcp";
    if (t.trace_kind === "forward_protocol") return "forward";
    if (t.trace_kind === "cat_webfetch") return "cat_webfetch";
    if (t.trace_kind === "chatgpt_backend") return "chatgpt_backend";
    if (t.trace_kind === "apply_patch") return "apply_patch";
    if (t.trace_kind === "codex_response") return "codex_response";
    return "mcp";
  }

  function summaryOf(t) {
    const k = kindOf(t);
    if (k === "forward" || k === "chatgpt_backend") {
      const ib = t.inbound || {};
      return `${esc(ib.method || "")} ${esc(ib.client_path || "")}`;
    }
    if (k === "cat_webfetch") {
      const r = t.request || {};
      return `${esc(t.tool || "")} ${esc(r.url || r.query || "")}`;
    }
    if (k === "apply_patch") {
      if ((t.phase || "call") === "result") {
        const o = t.output || {};
        return `↩ result ${esc((t.call_id || "").slice(-8))} ${t.is_error ? "ERROR" : "ok"} ${o.len || 0}B`;
      }
      // <model> · <source> · <extraction>;incomplete 时附原因,一眼定位 misbehave 模型/形态
      const reasons = (t.incomplete_reasons || []).join(",");
      return `${esc(t.model || "?")} · ${esc(t.source || "")} · ${esc(t.extraction || "")}`
        + (reasons ? ` · ${esc(reasons)}` : "");
    }
    if (k === "codex_response") {
      return `${esc(t.method || "")} ${esc(t.client_path || "")} → Codex`;
    }
    return `${esc((t.event || "mcp"))} ${esc(t.url || "")}`;
  }
  function statusOf(t) {
    const k = kindOf(t);
    if (k === "codex_response") return t.status || "";
    if (k === "apply_patch") {
      if ((t.phase || "call") === "result") return t.is_error ? "error" : "ok";
      return t.decision || "";
    }
    if (k === "cat_webfetch") {
      const f = t.fetch || {}, r = t.result || {};
      if (f.status != null) return f.status;
      return r.is_error ? "err" : "ok";
    }
    return (t.response && t.response.status) || t.status || "";
  }

  function matches(t) {
    const k = $("#kind").value;
    if (k !== "all" && kindOf(t) !== k) return false;
    const q = $("#q").value.trim().toLowerCase();
    if (!q) return true;
    return JSON.stringify(t).toLowerCase().includes(q);
  }

  function rowHtml(t) {
    const k = kindOf(t), st = statusOf(t);
    const stCls = st ? "st" + String(st)[0] : "";
    const ts = (t.captured_at || "").replace("T", " ").slice(5, 19);
    return `<div class="row ${t.seq === selected ? "sel" : ""}" data-seq="${t.seq}">
        <span class="ts">${esc(ts)}</span>
        <span class="badge ${k}">${k}</span>
        <span class="summary">${summaryOf(t)}</span>
        <span class="status ${stCls}">${esc(st)}</span>
      </div>`;
  }
  // [MOC-184 · D] 分组键:按 provider.id 或 upstream model(forward 才有;其它类回退到 kind)。
  function groupKeyOf(t) {
    const g = $("#group").value;
    if (g === "provider") return (t.provider && t.provider.id) || kindOf(t);
    if (g === "model") { const m = t.models || {}; return m.upstream || m.resolved || m.original || kindOf(t); }
    return null;
  }
  function renderList() {
    const rows = traces.filter(matches);
    if ($("#group").value === "none") {
      visibleSeqs = rows.map((t) => t.seq);
      listEl.innerHTML = rows.map(rowHtml).join("");
      return;
    }
    const order = [], buckets = new Map();
    rows.forEach((t) => {
      const key = String(groupKeyOf(t));
      if (!buckets.has(key)) { buckets.set(key, []); order.push(key); }
      buckets.get(key).push(t);
    });
    visibleSeqs = [];
    listEl.innerHTML = order.map((key) => {
      const items = buckets.get(key);
      items.forEach((t) => visibleSeqs.push(t.seq));
      return `<div class="group-hd"><span>${esc(key)}</span><span class="cnt">${items.length}</span></div>`
        + items.map(rowHtml).join("");
    }).join("");
  }

  function bodyBlock(b) {
    if (!b) return "<pre class='payload'>(无)</pre>";
    let content = b.content;
    if (content == null && b.encoding === "json_truncated_omitted") {
      content = "(大 JSON 被 tee 截断、无法脱敏 → 正文省略)";
    } else if (typeof content === "object") {
      content = JSON.stringify(content, null, 2);
    }
    const trunc = b.truncated_bytes > 0
      ? `<div class="trunc">⚠ 截断:原始 ${b.bytes} 字节,丢弃 ${b.truncated_bytes}(encoding=${esc(b.encoding)})</div>`
      : "";
    return `<pre class='payload'>${esc(content)}</pre>${trunc}`;
  }
  function hdrTable(h) {
    if (!h || typeof h !== "object") return "";
    const rows = Object.keys(h).map((k) =>
      `<tr><td class="k">${esc(k)}</td><td class="v">${esc(
        Array.isArray(h[k]) ? h[k].join(", ") : h[k])}</td></tr>`).join("");
    return `<table class="hdr">${rows}</table>`;
  }
  function seg(title, sub, inner, open) {
    const o = open === false ? "" : " open";
    return `<details class="seg"${o}><summary><span>${esc(title)}</span><span>${esc(sub || "")}</span></summary>
      <div class="body">${inner}</div></details>`;
  }

  // [MOC-184] 取 body 文本(同 bodyBlock 的内容,用于 diff / 复制)
  function bodyText(b) {
    if (!b || b.content == null) return "";
    return typeof b.content === "object" ? JSON.stringify(b.content, null, 2) : String(b.content);
  }

  // [MOC-184] OUTBOUND → curl(借鉴 claude-tap)。注:headers 已脱敏(authorization=***),
  // 复刻的是请求**形状**;真要重放上游需自行把凭据填回。
  // method:outbound trace 不带 method 字段,但 proxy 转发时原样沿用 inbound 的 verb
  // (forward.rs build_and_send_upstream `method.clone()`),故用 inbound method 复刻真实
  // 动词 —— 否则非 POST 的 passthrough(如 GET /v1/responses/{id})会被错复刻成 POST,
  // 误把 method 专属的上游失败当成 adapter/body 问题(codex-connector P2)。
  function buildCurl(ob, method) {
    if (!ob || !ob.url) return "";
    const q = (s) => "'" + String(s).replace(/'/g, "'\\''") + "'";
    let parts = ["curl -X " + (ob.method || method || "POST").toUpperCase() + " " + q(ob.url)];
    const h = ob.headers || {};
    Object.keys(h).forEach((k) => {
      parts.push("-H " + q(k + ": " + (Array.isArray(h[k]) ? h[k].join(", ") : h[k])));
    });
    const ob_body = ob.body || {};
    const truncated = (ob_body.truncated_bytes || 0) > 0 || ob_body.encoding === "json_truncated_omitted";
    const body = bodyText(ob_body);
    if (truncated) {
      // body 被诊断 cap 截断/省略(见 diagnostics.rs redact_body):partial JSON 直接重放会
      // 400/parse error,误判成 adapter/上游问题 → 用显眼占位替代静默 partial,提醒填回完整体
      // (codex-connector P2)。
      parts.push("--data-raw " + q("<<< 诊断 body 已截断:原 " + (ob_body.bytes != null ? ob_body.bytes : "?")
        + " 字节、省略 " + (ob_body.truncated_bytes != null ? ob_body.truncated_bytes : "?")
        + ";重放前请填回完整请求体 >>>"));
    } else if (body) {
      parts.push("--data-raw " + q(body));
    }
    return parts.join(" \\\n  ");
  }

  function copyText(s, btn) {
    if (btn && !btn.dataset.orig) btn.dataset.orig = btn.textContent; // 连点也只记真正原文一次
    const ok = () => {
      if (!btn) return;
      btn.classList.add("done"); btn.textContent = "已复制 ✓";
      clearTimeout(btn._restore);
      btn._restore = setTimeout(() => { btn.classList.remove("done"); btn.textContent = btn.dataset.orig; }, 1200);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(s).then(ok, () => fallbackCopy(s, ok));
    } else { fallbackCopy(s, ok); }
  }
  function fallbackCopy(s, ok) {
    const ta = document.createElement("textarea");
    ta.value = s; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); ok(); } catch (_) {}
    document.body.removeChild(ta);
  }

  // [MOC-184] 行级 LCS diff(借鉴 claude-tap structural diff)。我们用 INBOUND↔OUTBOUND
  // 看 adapter 把 Codex 请求转成了啥(跨协议会偏吵,但正是要看的转换结果)。两侧 pretty JSON 文本;
  // 大体量降级避免 O(n·m) 爆。
  function diffLines(aText, bText) {
    if (!aText && !bText) return `<div class="meta">(两侧均无 body,无可 diff)</div>`;
    const a = aText.split("\n"), b = bText.split("\n");
    if (a.length > 1500 || b.length > 1500) {
      return `<div class="trunc">⚠ 体量过大(${a.length}/${b.length} 行),跳过 diff,看上面两段原文</div>`;
    }
    const n = a.length, m = b.length;
    const dp = Array.from({ length: n + 1 }, () => new Int32Array(m + 1));
    for (let i = n - 1; i >= 0; i--)
      for (let j = m - 1; j >= 0; j--)
        dp[i][j] = a[i] === b[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
    let i = 0, j = 0; const out = [];
    while (i < n && j < m) {
      if (a[i] === b[j]) { out.push(["ctx", "  " + a[i]]); i++; j++; }
      else if (dp[i + 1][j] >= dp[i][j + 1]) { out.push(["del", "- " + a[i]]); i++; }
      else { out.push(["add", "+ " + b[j]]); j++; }
    }
    while (i < n) out.push(["del", "- " + a[i++]]);
    while (j < m) out.push(["add", "+ " + b[j++]]);
    const lines = out.map(([t, l]) => `<span class="${t}">${esc(l)}</span>`).join("\n");
    return `<pre class="payload diff">${lines}</pre>`;
  }

  // ── [MOC-184 · C] Token 用量分解 ──────────────────────────────────────────
  // response body 是上游 raw 回包(transform 前),usage 用上游原生命名:Responses
  // (input_tokens/output_tokens)/ Chat(prompt_tokens/completion_tokens)/ Gemini
  // (usageMetadata.*TokenCount)/ Anthropic(cache_read_input_tokens 等)。流式时 body
  // 是 SSE 文本,usage 在末尾事件(response.completed / 带 usage 的 chunk)里,取最后一个。
  function findUsage(j) {
    if (!j || typeof j !== "object") return null;
    if (j.usage && typeof j.usage === "object") return j.usage;
    if (j.usageMetadata && typeof j.usageMetadata === "object") return j.usageMetadata;
    if (j.response && typeof j.response === "object") return findUsage(j.response);
    return null;
  }
  function normUsage(u) {
    if (!u || typeof u !== "object") return null;
    const pick = (...xs) => { for (const x of xs) if (typeof x === "number") return x; return null; };
    const inD = u.input_tokens_details || u.prompt_tokens_details || {};
    const outD = u.output_tokens_details || u.completion_tokens_details || {};
    const r = {
      input: pick(u.input_tokens, u.prompt_tokens, u.promptTokenCount),
      output: pick(u.output_tokens, u.completion_tokens, u.candidatesTokenCount),
      total: pick(u.total_tokens, u.totalTokenCount),
      cache: pick(inD.cached_tokens, u.cache_read_input_tokens, u.cachedContentTokenCount),
      reasoning: pick(outD.reasoning_tokens, u.thoughtsTokenCount),
    };
    if (r.total == null && (r.input != null || r.output != null)) r.total = (r.input || 0) + (r.output || 0);
    return ["input", "output", "total", "cache", "reasoning"].some((k) => r[k] != null) ? r : null;
  }
  function extractUsage(rs) {
    const b = rs && rs.body;
    if (!b) return null;
    if (b.encoding === "json" && b.content && typeof b.content === "object") return normUsage(findUsage(b.content));
    if (b.encoding === "utf8" && typeof b.content === "string") {
      let found = null;
      for (const line of b.content.split("\n")) {
        const s = line.trim();
        if (!s.startsWith("data:")) continue;
        const payload = s.slice(5).trim();
        if (!payload || payload === "[DONE]") continue;
        try { const u = findUsage(JSON.parse(payload)); if (u) found = u; } catch (_) {}
      }
      if (!found) { try { found = findUsage(JSON.parse(b.content)); } catch (_) {} }
      return normUsage(found);
    }
    return null;
  }
  function usageBar(u) {
    if (!u) return "";
    const chip = (label, v, cls) => v == null ? ""
      : `<span class="uchip ${cls || ""}">${esc(label)} <b>${esc(v.toLocaleString())}</b></span>`;
    return `<div class="usage">`
      + chip("输入", u.input, "in") + chip("输出", u.output, "out") + chip("总计", u.total, "tot")
      + chip("缓存命中", u.cache, "cache") + chip("推理", u.reasoning, "reason") + `</div>`;
  }

  // ── [MOC-184 · E] forward 的结构化 tool / 消息卡片(复用 #400 per-kind 渲染思路)──
  // INBOUND 是 Codex 原始 Responses 请求(input[]+tools[]);跨 provider 的 outbound 可能是
  // messages[](Chat/Anthropic)或 contents[](Gemini)。尽力识别,识别不了的退回原始 <pre>
  // (下方 INBOUND/OUTBOUND 段仍在)。
  const MAX_CARDS = 80;
  function partText(c) {
    if (c == null) return "";
    if (typeof c === "string") return c;
    if (Array.isArray(c)) return c.map(partText).join("");
    if (typeof c === "object") {
      if (typeof c.text === "string") return c.text;
      if (typeof c.input_text === "string") return c.input_text;
      if (c.functionCall) return "→ " + (c.functionCall.name || "") + "(" + JSON.stringify(c.functionCall.args || {}) + ")";
      if (c.functionResponse) return "← " + (c.functionResponse.name || "") + " 结果";
      if (c.type === "function_call") return "→ " + (c.name || "") + "(" + (c.arguments || "") + ")";
      if (c.type === "function_call_output") return "← output: " + partText(c.output);
      if (c.type === "tool_use") return "→ " + (c.name || "") + "(" + JSON.stringify(c.input || {}) + ")";
      if (c.type === "tool_result") return "← " + partText(c.content);
      return JSON.stringify(c);
    }
    return String(c);
  }
  function msgItems(content) {
    if (!content || typeof content !== "object") return null;
    if (Array.isArray(content.input)) return { kind: "Responses input[]", items: content.input };
    if (Array.isArray(content.messages)) return { kind: "messages[]", items: content.messages };
    if (Array.isArray(content.contents)) return { kind: "Gemini contents[]", items: content.contents };
    return null;
  }
  function roleOf(it) { return (it && (it.role || it.type || (it.functionCall ? "model" : ""))) || "msg"; }
  function itemText(it) {
    if (!it || typeof it !== "object") return it == null ? "(null)" : String(it);   // 畸形元素(null/原始值)不抛,退回占位
    const parts = [];
    if (it.content != null) parts.push(partText(it.content));
    if (Array.isArray(it.tool_calls))
      parts.push(it.tool_calls.map((tc) => {
        const fn = tc.function || tc;
        return "→ " + (fn.name || "") + "(" + (fn.arguments || "") + ")";
      }).join("\n"));
    if (it.parts) parts.push(partText(it.parts));
    if (it.type === "function_call" || it.type === "function_call_output") parts.push(partText(it));
    if (it.type === "reasoning" && !parts.length) parts.push("(reasoning)");
    return parts.filter(Boolean).join("\n") || JSON.stringify(it);
  }
  function renderMsgCards(content) {
    const mi = msgItems(content);
    if (!mi || !mi.items.length) return null;
    let html = mi.items.slice(0, MAX_CARDS).map((it) => {
      let txt = itemText(it);
      if (txt.length > 4000) txt = txt.slice(0, 4000) + " …(截断)";
      return `<div class="card"><span class="role">${esc(roleOf(it))}</span>`
        + `<pre class="payload mini">${esc(txt)}</pre></div>`;
    }).join("");
    if (mi.items.length > MAX_CARDS)
      html += `<div class="trunc">⚠ 仅显示前 ${MAX_CARDS} / ${mi.items.length} 条,余看下方 INBOUND 原文</div>`;
    return { count: mi.items.length, kind: mi.kind, html };
  }
  function toolDecls(content) {
    if (!content || typeof content !== "object") return null;
    let tools = content.tools;
    if (Array.isArray(tools) && tools[0] && Array.isArray(tools[0].functionDeclarations))
      tools = tools.flatMap((t) => t.functionDeclarations || []);   // Gemini: tools:[{functionDeclarations:[…]}]
    return Array.isArray(tools) && tools.length ? tools : null;
  }
  function renderToolCards(content) {
    const tools = toolDecls(content);
    if (!tools) return null;
    const html = tools.map((tl) => {
      const fn = tl.function || tl;   // Chat 包一层 .function
      const name = esc(fn.name || tl.name || "(anon)");
      const desc = fn.description || tl.description || "";
      const params = fn.parameters || tl.parameters || tl.input_schema;
      return `<div class="card"><span class="role tool">${name}</span>`
        + (desc ? `<div class="tdesc">${esc(desc)}</div>` : "")
        + (params ? `<pre class="payload mini">${esc(JSON.stringify(params, null, 2))}</pre>` : "")
        + `</div>`;
    }).join("");
    return { count: tools.length, html };
  }

  function renderDetail(t) {
    if (!t) { detailEl.innerHTML = "<div class='empty'>选择左侧一条记录查看详情</div>"; return; }
    const k = kindOf(t);
    if (k === "cat_webfetch") { renderCatWebfetch(t); return; }
    if (k === "apply_patch") { renderApplyPatch(t); return; }
    if (k === "codex_response") { renderCodexResponse(t); return; }
    // chatgpt_backend(passthrough)结构同 forward(inbound/outbound/response),复用同一渲染。
    if (k !== "forward" && k !== "chatgpt_backend") {
      detailEl.innerHTML = `<div class="tools"><button data-copy="full">复制 JSON</button></div>`
        + `<pre class="payload">${esc(JSON.stringify(t, null, 2))}</pre>`;
      return;
    }
    const p = t.provider || {}, m = t.models || {}, ib = t.inbound || {}, ob = t.outbound || {}, rs = t.response || {};
    const hasModels = m.original || m.resolved || m.upstream;
    const meta = `provider: ${esc(p.id)} (${esc(p.api_format)} / ${esc(p.auth_scheme)})`
      + (hasModels ? ` · models: ${esc(m.original)} → ${esc(m.resolved)} → ${esc(m.upstream)}` : "")
      + ` · seq ${esc(t.seq)} · ${esc(t.captured_at)}`;
    const usage = extractUsage(rs);
    // E 卡片基于 INBOUND(Codex 原始);body 非完整 JSON(截断/省略)时跳过,原始段仍在下方。
    const ibStruct = ib.body && ib.body.encoding === "json" ? ib.body.content : null;
    const toolCards = renderToolCards(ibStruct);
    const msgCards = renderMsgCards(ibStruct);
    detailEl.innerHTML = `<div class="meta">${meta}</div>`
      + usageBar(usage)
      + `<div class="tools">`
      +   `<button data-copy="curl">复制 OUTBOUND curl</button>`
      +   `<button data-copy="ob">复制 OUTBOUND body</button>`
      +   `<button data-copy="ib">复制 INBOUND body</button>`
      + `</div>`
      + (toolCards ? seg(`工具 · ${toolCards.count}`, "INBOUND tools[]", toolCards.html, false) : "")
      + (msgCards ? seg(`消息 · 结构化 (${msgCards.count})`, msgCards.kind, msgCards.html, false) : "")
      + seg("INBOUND · Codex 原始请求", `${esc(ib.method)} ${esc(ib.client_path || "")}${ib.client_query ? "?" + esc(ib.client_query) : ""}`,
          hdrTable(ib.headers) + bodyBlock(ib.body))
      + seg("OUTBOUND · 转换后发上游", esc(ob.url || ""), hdrTable(ob.headers) + bodyBlock(ob.body))
      + seg("RESPONSE · 上游回包 (raw)", "status " + esc(rs.status), hdrTable(rs.headers) + bodyBlock(rs.body))
      + seg("DIFF · INBOUND → OUTBOUND(adapter 改了啥)", "红=移除 绿=新增 · 跨协议偏吵正常",
          diffLines(bodyText(ib.body), bodyText(ob.body)), false);
  }

  // MOC-181: cat-webfetch 链路详情(请求 / 抓取+升级链 / 摘要 prompt+响应 / 结果)。
  function renderCatWebfetch(t) {
    const r = t.request || {}, f = t.fetch || {}, s = t.summarize || {}, res = t.result || {};
    let html = `<div class="meta">tool: ${esc(t.tool)} · seq ${esc(t.seq)} · ${esc(t.captured_at)}</div>`;
    html += `<div class="tools"><button data-copy="full">复制 JSON</button></div>`;
    html += seg("请求 · request", esc(t.tool || ""), hdrTable(r));
    if (f && Object.keys(f).length) {
      const fcopy = Object.assign({}, f); delete fcopy.escalation_trail;
      let inner = hdrTable(fcopy);
      if (Array.isArray(f.escalation_trail) && f.escalation_trail.length) {
        inner += `<div class="meta">升级历程 escalation_trail:</div>`
          + `<pre class="payload">${esc(f.escalation_trail.join("\n"))}</pre>`;
      }
      html += seg("抓取 · fetch", esc(f.final_tier || f.backend || ""), inner);
    }
    if (s && Object.keys(s).length) {
      if (s.fallback_raw) {
        html += seg("摘要 · fallback(回退原文)", "未生成",
          `<pre class="payload">摘要未生成: ${esc(s.error || "")}</pre>`);
      } else {
        const scopy = Object.assign({}, s); delete scopy.prompt_sent; delete scopy.response;
        const inner = hdrTable(scopy)
          + `<div class="meta">prompt_sent(完整喂给摘要模型):</div>`
          + `<pre class="payload">${esc(s.prompt_sent || "")}</pre>`
          + `<div class="meta">response(摘要模型原始回复):</div>`
          + `<pre class="payload">${esc(s.response || "")}</pre>`;
        html += seg("摘要 · summarize", esc(s.model || ""), inner);
      }
    }
    html += seg("结果 · result", res.is_error ? "ERROR" : "ok", hdrTable(res));
    detailEl.innerHTML = html;
  }

  // apply-patch 决策链详情:原始 args → 提取+修复 V4A(含 diff)→ 截断/语法 verdict → completed/incomplete。
  // 精修本模块时一眼看清「上游回了啥 / extract_apply_patch_input + repair_v4a_envelope 改了啥 /
  // 为什么判 incomplete」。
  // 按 call_id + phase 找配对的 apply_patch 记录(call ↔ result 互链)。
  function apTraceByPhase(callId, phase) {
    return traces.find((x) => kindOf(x) === "apply_patch" && (x.phase || "call") === phase && x.call_id === callId);
  }

  function renderApplyPatch(t) {
    const phase = t.phase || "call";

    // ── phase = result:Codex apply 后回灌给模型的结果(成功/错误);失败正是触发模型重试的原因 ──
    if (phase === "result") {
      const o = t.output || {};
      const oTrunc = o.truncated_bytes > 0 ? `<div class="trunc">⚠ 截断:原 ${o.len} 字节,丢 ${o.truncated_bytes}</div>` : "";
      const call = apTraceByPhase(t.call_id, "call");
      let callInner;
      if (call) {
        const ci = call.input || {};
        callInner = `<table class="hdr">`
          + `<tr><td class="k">model</td><td class="v">${esc(call.model || "?")} / ${esc(call.source || "")}</td></tr>`
          + `<tr><td class="k">decision</td><td class="v">${esc(call.decision || "?")}</td></tr>`
          + `<tr><td class="k">input</td><td class="v">${ci.len || 0} 字节</td></tr></table>`
          + `<pre class="payload mini">${esc((ci.v4a || "").slice(0, 4000))}</pre>`
          + `<div class="meta">→ 列表选 seq ${esc(call.seq)} 看该 patch 完整记录(args / diff / verdict)</div>`;
      } else {
        callInner = `<div class="meta">未找到对应 patch call(可能已被 ring 淘汰,或诊断在该 call 之后才开启)</div>`;
      }
      detailEl.innerHTML = `<div class="meta">phase: result · call_id ${esc(t.call_id || "")} · seq ${esc(t.seq)} · ${esc(t.captured_at || "")}</div>`
        + `<div class="usage"><span class="vchip ${t.is_error ? "err" : "ok"}">apply 结果: ${t.is_error ? "ERROR(触发重试)" : "ok"}</span></div>`
        + `<div class="tools"><button data-copy="ap_output">复制结果</button><button data-copy="full">复制 JSON</button></div>`
        + seg("apply 结果 · Codex 回灌给模型的 output", `${o.len || 0} 字节`,
            `<pre class="payload">${esc(o.text || "")}</pre>${oTrunc}`)
        + seg("对应的 patch call", esc((t.call_id || "").slice(-12)), callInner, false);
      return;
    }

    // ── phase = call:模型发出的 patch + 我们这层的提取/校验/决策 ──
    const a = t.args || {}, inp = t.input || {}, c = t.checks || {};
    const reasons = t.incomplete_reasons || [];
    const completed = t.decision === "completed";
    const meta = `model: ${esc(t.model || "?")} · source: ${esc(t.source || "")} · call_id ${esc(t.call_id || "")}`
      + ` · seq ${esc(t.seq)} · ${esc(t.captured_at || "")}`;
    const chips = [
      `<span class="vchip ${completed ? "ok" : "err"}">decision: ${esc(t.decision || "?")}</span>`,
      `<span class="vchip ${(t.extraction === "raw_fallback" || t.extraction === "empty") ? "warn" : "ok"}">extraction: ${esc(t.extraction || "?")}</span>`,
      `<span class="vchip ${c.interrupted ? "warn" : "ok"}">interrupted: ${c.interrupted ? "yes" : "no"}</span>`,
      `<span class="vchip ${c.json_truncation ? "err" : "ok"}">json: ${c.json_truncation ? "truncated" : "ok"}</span>`,
      `<span class="vchip ${c.v4a_truncation ? "err" : "ok"}">v4a-trunc: ${c.v4a_truncation ? "yes" : "no"}</span>`,
      `<span class="vchip ${c.v4a_validation ? "err" : "ok"}">v4a-syntax: ${c.v4a_validation ? "invalid" : "ok"}</span>`,
    ];
    if (reasons.length) chips.push(`<span class="vchip warn">reasons: ${esc(reasons.join(","))}</span>`);

    let checkRows = "";
    if (c.json_truncation) checkRows += `<tr><td class="k">json_truncation</td><td class="v">${esc(c.json_truncation)}</td></tr>`;
    if (c.v4a_truncation) checkRows += `<tr><td class="k">v4a_truncation</td><td class="v">${esc(c.v4a_truncation)}</td></tr>`;
    if (c.v4a_validation) checkRows += `<tr><td class="k">v4a_validation</td><td class="v">line ${esc(c.v4a_validation.line)}: ${esc(c.v4a_validation.message)}</td></tr>`;
    const checksSeg = checkRows
      ? seg("校验 verdict · checks", "有失败 → incomplete", `<table class="hdr">${checkRows}</table>`)
      : seg("校验 verdict · checks", "全过(completed)", `<div class="meta">无截断 / 语法问题</div>`);

    const argTrunc = a.truncated_bytes > 0 ? `<div class="trunc">⚠ 截断:原 ${a.len} 字节,丢 ${a.truncated_bytes}</div>` : "";
    const inpTrunc = inp.truncated_bytes > 0 ? `<div class="trunc">⚠ 截断:原 ${inp.len} 字节,丢 ${inp.truncated_bytes}</div>` : "";

    // pre-flight 自动修复(读盘对齐安全的上下文失配)。每个 Update File 一条记录。
    const repairs = Array.isArray(t.repairs) ? t.repairs : [];
    const nRepaired = repairs.filter((r) => r.kind === "repaired").length;
    const nSkipped = repairs.filter((r) => (r.kind || "").startsWith("skipped")).length;
    const repairChip = (k) => k === "repaired" ? "warn" : ((k || "").startsWith("skipped") ? "err" : "ok");
    const repairsSeg = repairs.length
      ? seg(`pre-flight 自动修复 · 修复 ${nRepaired} / 放行 ${nSkipped} / 共 ${repairs.length} 文件`,
          nRepaired ? "已对齐上下文锚点(免 Failed to find)" : (nSkipped ? "有放行未修" : "本就匹配"),
          `<table class="hdr">` + repairs.map((r) =>
            `<tr><td class="k">${esc(r.file)}</td><td class="v"><span class="vchip ${repairChip(r.kind)}">${esc(r.kind)}</span> ${esc(r.detail)}</td></tr>`
          ).join("") + `</table>`, nRepaired > 0 || nSkipped > 0 ? true : false)
      : "";

    // apply 结果回灌(下一轮请求才会带回);completed 的 call 才追踪结果。
    const result = apTraceByPhase(t.call_id, "result");
    const resultSeg = result
      ? seg("apply 结果 · Codex 回灌", result.is_error ? "ERROR(触发重试)" : "ok",
          `<div class="usage"><span class="vchip ${result.is_error ? "err" : "ok"}">${result.is_error ? "ERROR" : "ok"}</span></div>`
          + `<pre class="payload">${esc((result.output || {}).text || "")}</pre>`)
      : seg("apply 结果 · Codex 回灌", completed ? "尚未捕获" : "incomplete · 不会执行",
          `<div class="meta">${completed ? "还没看到这条 patch 的结果回灌(下一轮请求才带回)" : "incomplete 的 patch Codex 不执行,无结果"}</div>`, false);

    detailEl.innerHTML = `<div class="meta">${meta}</div>`
      + `<div class="usage">${chips.join("")}</div>`
      + `<div class="tools">`
      +   `<button data-copy="ap_args">复制原始 args</button>`
      +   `<button data-copy="ap_input">复制提取 V4A</button>`
      +   `<button data-copy="full">复制 JSON</button>`
      + `</div>`
      + repairsSeg
      + resultSeg
      + checksSeg
      + seg("① 原始 args · 上游回的 function arguments", `${a.len || 0} 字节`,
          `<pre class="payload">${esc(a.raw || "")}</pre>${argTrunc}`)
      + seg("② 提取 + 修复后 V4A · 发给 Codex 的 input", `${inp.len || 0} 字节`,
          `<pre class="payload">${esc(inp.v4a || "")}</pre>${inpTrunc}`)
      + seg("DIFF · 原始 args → 提取 V4A(extract/repair 改了啥)", "红=移除 绿=新增",
          diffLines(a.raw || "", inp.v4a || ""), false);
  }

  // proxy→Codex 转换后响应(MOC-194):看真正发给 Codex 的 SSE。附 apply_patch wire 统计,
  // 直接核对「每个 apply_patch 的 output_item.added/done 是否都发到了」(Q1)。
  function renderCodexResponse(t) {
    const b = t.body || {};
    const txt = typeof b.content === "string" ? b.content : (b.content == null ? "" : JSON.stringify(b.content));
    const count = (re) => (txt.match(re) || []).length;
    const added = count(/response\.output_item\.added/g);
    const done = count(/response\.output_item\.done/g);
    const apCall = count(/"type":"custom_tool_call"/g);
    const apInputDone = count(/response\.custom_tool_call_input\.done/g);
    const meta = `${esc(t.method || "")} ${esc(t.client_path || "")} → Codex · status ${esc(t.status)} · seq ${esc(t.seq)} · ${esc(t.captured_at || "")}`;
    const chips = `<div class="usage">`
      + `<span class="uchip">output_item.added <b>${added}</b></span>`
      + `<span class="uchip">output_item.done <b>${done}</b></span>`
      + `<span class="uchip">custom_tool_call <b>${apCall}</b></span>`
      + `<span class="uchip">apply_patch input.done <b>${apInputDone}</b></span>`
      + `</div>`;
    detailEl.innerHTML = `<div class="meta">${meta}</div>`
      + chips
      + `<div class="tools"><button data-copy="cr_body">复制 SSE</button><button data-copy="full">复制 JSON</button></div>`
      + seg("proxy→Codex 转换后 SSE", `${b.bytes || 0} 字节`, bodyBlock(b));
  }

  function add(t, prepend) {
    if (prepend) traces.unshift(t); else traces.push(t);
    if (traces.length > 1000) traces.length = 1000;
  }

  listEl.addEventListener("click", (e) => {
    const row = e.target.closest(".row");
    if (!row) return;
    selected = Number(row.dataset.seq);
    renderList();
    renderDetail(traces.find((t) => t.seq === selected));
  });
  // [MOC-184] 详情区复制按钮(委托):curl / OUTBOUND body / INBOUND body / 整条 JSON
  detailEl.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-copy]");
    if (!btn) return;
    const t = traces.find((x) => x.seq === selected);
    if (!t) return;
    const what = btn.dataset.copy;
    let s = "";
    if (what === "curl") s = buildCurl(t.outbound, (t.inbound || {}).method);
    else if (what === "ob") s = bodyText((t.outbound || {}).body) || JSON.stringify(t.outbound || {}, null, 2);
    else if (what === "ib") s = bodyText((t.inbound || {}).body) || JSON.stringify(t.inbound || {}, null, 2);
    else if (what === "ap_args") s = (t.args || {}).raw || "";
    else if (what === "ap_input") s = (t.input || {}).v4a || "";
    else if (what === "ap_output") s = (t.output || {}).text || "";
    else if (what === "cr_body") s = bodyText(t.body) || "";
    else s = JSON.stringify(t, null, 2);
    copyText(s, btn);
  });
  $("#kind").addEventListener("change", renderList);
  $("#q").addEventListener("input", renderList);
  $("#group").addEventListener("change", renderList);
  // [MOC-184 · F] j/k(或 ↑/↓)在可见列表里上下移动选中;焦点在搜索框/下拉里时不拦截(留给输入)。
  function moveSel(delta) {
    if (!visibleSeqs.length) return;
    let idx = visibleSeqs.indexOf(selected);
    if (idx === -1) idx = delta > 0 ? -1 : visibleSeqs.length;   // 未选中:j→第一条,k→最后一条
    idx = Math.max(0, Math.min(visibleSeqs.length - 1, idx + delta));
    selected = visibleSeqs[idx];
    renderList();
    renderDetail(traces.find((t) => t.seq === selected));
    const row = listEl.querySelector(`.row[data-seq="${selected}"]`);
    if (row) row.scrollIntoView({ block: "nearest" });
  }
  document.addEventListener("keydown", (e) => {
    const tag = (document.activeElement && document.activeElement.tagName) || "";
    if (tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA") return;
    if (e.key === "j" || e.key === "ArrowDown") { e.preventDefault(); moveSel(1); }
    else if (e.key === "k" || e.key === "ArrowUp") { e.preventDefault(); moveSel(-1); }
  });
  $("#clear").addEventListener("click", async () => {
    await fetch("/api/clear", { method: "POST" });
    traces = []; selected = null; renderList(); renderDetail(null);
  });

  async function loadHistory() {
    try {
      const r = await fetch("/api/traces");
      const arr = await r.json();
      traces = arr.slice().reverse();   // 后端 oldest→newest;UI 最新在上
      renderList();
    } catch (e) { /* 服务未就绪,SSE 会补 */ }
  }

  function connect() {
    const es = new EventSource("/api/stream");
    es.onopen = () => { liveEl.classList.add("on"); liveTxt.textContent = "实时"; };
    es.onerror = () => { liveEl.classList.remove("on"); liveTxt.textContent = "重连中…"; };
    es.onmessage = (ev) => {
      try { add(JSON.parse(ev.data), true); renderList(); } catch (_) {}
    };
    es.addEventListener("lagged", () => { loadHistory(); });  // 落后 → resync
  }

  loadHistory();
  connect();
})();
</script>
</body>
</html>
